name: Auto Backup

on:
  schedule:
    # 毎日 JST 3:00 AM（= UTC 18:00 前日）に実行
    - cron: '0 18 * * *'
  # 手動実行可能（GitHub Actions タブから "Run workflow"）
  workflow_dispatch:

# セキュリティ注意:
# このリポジトリは PUBLIC のため、バックアップデータをこのリポジトリにコミットしない。
# 保存先:
#   1. Actions Artifacts（90日、リポジトリオーナーのみアクセス可）— 即時の保険
#   2. Google Drive（南部地区合同事務局）— 永続保管・組織内共有

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch backup from Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          DISTRICT_ID: '11111111-1111-1111-1111-111111111111'
        run: |
          mkdir -p backups
          TS=$(TZ='Asia/Tokyo' date +'%Y-%m-%d_%H-%M')

          echo "Fetching speakers..."
          SP=$(curl -s -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/speakers?district_id=eq.$DISTRICT_ID&select=*")

          echo "Fetching tasks..."
          TK=$(curl -s -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/tasks?district_id=eq.$DISTRICT_ID&select=*")

          echo "Fetching chapter_settings..."
          CS=$(curl -s -H "apikey: $SUPABASE_KEY" -H "Authorization: Bearer $SUPABASE_KEY" \
            "$SUPABASE_URL/rest/v1/chapter_settings?select=chapter_id,settings")

          SP_COUNT=$(echo "$SP" | jq 'length')
          TK_COUNT=$(echo "$TK" | jq 'length')

          FILENAME="backup_${TS}_講師${SP_COUNT}件_タスク${TK_COUNT}件.json"
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
            --argjson sp "$SP" \
            --argjson tk "$TK" \
            --argjson cs "$CS" \
            --argjson sp_count "$SP_COUNT" \
            --argjson tk_count "$TK_COUNT" \
            '{
              version: 2,
              source: "github-actions-auto-backup",
              exportedAt: $ts,
              counts: { speakers: $sp_count, tasks: $tk_count },
              speakers: $sp,
              tasks: $tk,
              chapterSettings: $cs
            }' > "backups/$FILENAME"

          cp "backups/$FILENAME" "backups/latest.json"

          echo "BACKUP_FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "SP_COUNT=$SP_COUNT" >> $GITHUB_ENV
          echo "TK_COUNT=$TK_COUNT" >> $GITHUB_ENV
          echo "TS=$TS" >> $GITHUB_ENV

          echo "## 📤 バックアップ完了" >> $GITHUB_STEP_SUMMARY
          echo "- **ファイル**: \`$FILENAME\`" >> $GITHUB_STEP_SUMMARY
          echo "- **講師**: ${SP_COUNT}件" >> $GITHUB_STEP_SUMMARY
          echo "- **タスク**: ${TK_COUNT}件" >> $GITHUB_STEP_SUMMARY
          echo "- **取得日時**: ${TS} (JST)" >> $GITHUB_STEP_SUMMARY

      - name: Upload as Actions Artifact (90日保管)
        uses: actions/upload-artifact@v4
        with:
          name: nanbu-backup-${{ github.run_number }}
          path: backups/
          retention-days: 90

      - name: Setup Node for Google Drive upload
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Upload to Google Drive
        env:
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          if [ -z "$GDRIVE_SERVICE_ACCOUNT_KEY" ] || [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "⚠ GDRIVE secrets が未設定のため Google Drive アップロードをスキップします"
            echo "## ⚠ Google Drive 未設定" >> $GITHUB_STEP_SUMMARY
            echo "Repository Settings → Secrets で \`GDRIVE_SERVICE_ACCOUNT_KEY\` と \`GDRIVE_FOLDER_ID\` を登録してください。" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          npm init -y >/dev/null 2>&1
          npm install googleapis@131 --no-save --silent

          cat > upload.mjs << 'EOF'
          import { google } from 'googleapis';
          import fs from 'fs';

          const key = JSON.parse(process.env.GDRIVE_SERVICE_ACCOUNT_KEY);
          const folderId = process.env.GDRIVE_FOLDER_ID;

          const auth = new google.auth.GoogleAuth({
            credentials: key,
            scopes: ['https://www.googleapis.com/auth/drive'],
          });
          const drive = google.drive({ version: 'v3', auth });

          const uploadFile = async (filename, overwrite = false) => {
            const filepath = `backups/${filename}`;
            if (overwrite) {
              // 既存の同名ファイルを削除（latest.json用）
              const existing = await drive.files.list({
                q: `name='${filename}' and '${folderId}' in parents and trashed=false`,
                fields: 'files(id,name)',
                supportsAllDrives: true,
                includeItemsFromAllDrives: true,
              });
              for (const f of existing.data.files) {
                await drive.files.delete({ fileId: f.id, supportsAllDrives: true });
                console.log(`  🗑  Deleted old: ${f.name}`);
              }
            }
            const res = await drive.files.create({
              requestBody: { name: filename, parents: [folderId] },
              media: { mimeType: 'application/json', body: fs.createReadStream(filepath) },
              fields: 'id,name,webViewLink',
              supportsAllDrives: true,
            });
            console.log(`  ✅ Uploaded: ${res.data.name}`);
            console.log(`     ${res.data.webViewLink}`);
            return res.data;
          };

          console.log('📤 Uploading to Google Drive...');
          const timestamped = process.env.BACKUP_FILENAME;
          const r1 = await uploadFile(timestamped, false);
          const r2 = await uploadFile('latest.json', true);

          // GITHUB_STEP_SUMMARY追記
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,
            `\n## ☁️ Google Drive アップロード完了\n` +
            `- [${timestamped}](${r1.webViewLink})\n` +
            `- [latest.json](${r2.webViewLink})\n`);
          EOF

          BACKUP_FILENAME="$BACKUP_FILENAME" node upload.mjs
